services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: memory-routine-backend
    env_file:
      - .env
    expose:
      - "5000"
    volumes:
      - ./backend/structured:/app/structured
      - ${HOME}/.aws:/root/.aws:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: memory-routine-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
